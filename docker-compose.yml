services:
  error-page:
    image: your-registry/error-page-svelte:latest
    networks:
      - dokploy-network
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints: [node.hostname == askipannu]
      labels:
        - "traefik.enable=true"
        - "traefik.http.services.error-pages.loadbalancer.server.port=80"

networks:
  dokploy-network:
    external: true
